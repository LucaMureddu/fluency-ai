<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 0 12px;
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Halo ring (idle glow) ── */
  #ptt-halo {
    position: relative;
    width: 108px;
    height: 108px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #ptt-halo::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #3b82f6, #6366f1, #a78bfa, #3b82f6);
    opacity: 0.18;
    animation: halo-spin 4s linear infinite;
  }
  @keyframes halo-spin {
    to { transform: rotate(360deg); }
  }

  /* ── Pulsante Hero ── */
  #ptt-btn {
    position: relative;
    z-index: 1;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #3b82f6, #6366f1, #7c3aed);
    color: white;
    font-size: 36px;
    cursor: pointer;
    touch-action: none;
    outline: none;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1),
                box-shadow 0.15s ease;
    box-shadow:
      0 8px 24px rgba(59,130,246,.45),
      0 2px 8px rgba(99,102,241,.3),
      inset 0 1px 0 rgba(255,255,255,.2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #ptt-btn:hover:not(:disabled) {
    transform: scale(1.07) translateY(-2px);
    box-shadow:
      0 12px 32px rgba(59,130,246,.5),
      0 4px 12px rgba(99,102,241,.35),
      inset 0 1px 0 rgba(255,255,255,.2);
  }

  #ptt-btn:active:not(.recording) {
    transform: scale(0.95);
    box-shadow: 0 4px 12px rgba(59,130,246,.35);
  }

  /* Stato: registrazione in corso */
  #ptt-btn.recording {
    background: linear-gradient(145deg, #f87171, #ef4444, #dc2626);
    box-shadow:
      0 0 0 0 rgba(239, 68, 68, 0.7),
      0 8px 24px rgba(239,68,68,.4);
    animation: pulse-hero 1.2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  /* Stato: elaborazione */
  #ptt-btn.processing {
    background: linear-gradient(145deg, #fbbf24, #f59e0b, #d97706);
    cursor: wait;
    box-shadow: 0 8px 24px rgba(245,158,11,.35);
    animation: spin-slow 1.5s linear infinite;
  }

  /* Stato: errore / disabilitato */
  #ptt-btn:disabled {
    background: linear-gradient(145deg, #9ca3af, #6b7280);
    cursor: not-allowed;
    box-shadow: none;
    animation: none;
    opacity: 0.65;
  }

  @keyframes pulse-hero {
    0%   { box-shadow: 0 0 0 0   rgba(239,68,68,.7), 0 8px 24px rgba(239,68,68,.4); }
    50%  { box-shadow: 0 0 0 22px rgba(239,68,68,.0), 0 8px 24px rgba(239,68,68,.4); }
    100% { box-shadow: 0 0 0 0   rgba(239,68,68,.0), 0 8px 24px rgba(239,68,68,.4); }
  }

  @keyframes spin-slow {
    from { filter: hue-rotate(0deg); }
    to   { filter: hue-rotate(360deg); }
  }

  /* ── Testo di stato ── */
  #status {
    margin-top: 12px;
    font-size: 13px;
    font-weight: 700;
    color: #94a3b8;
    letter-spacing: 0.01em;
    text-align: center;
    min-height: 19px;
    transition: color 0.2s;
  }
  #status.recording-text  { color: #ef4444; }
  #status.processing-text { color: #f59e0b; }
  #status.error-text      { color: #dc2626; }

  /* ── Waveform indicator ── */
  #waveform {
    display: none;
    align-items: flex-end;
    gap: 3px;
    height: 22px;
    margin-top: 10px;
  }
  #waveform.visible { display: flex; }
  .bar {
    width: 4px;
    border-radius: 2px;
    background: linear-gradient(to top, #ef4444, #f87171);
    animation: wave 0.75s ease-in-out infinite;
  }
  .bar:nth-child(1) { height: 5px;  animation-delay: 0s; }
  .bar:nth-child(2) { height: 12px; animation-delay: 0.1s; }
  .bar:nth-child(3) { height: 20px; animation-delay: 0.2s; }
  .bar:nth-child(4) { height: 12px; animation-delay: 0.3s; }
  .bar:nth-child(5) { height: 5px;  animation-delay: 0.4s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
    50%       { transform: scaleY(1);   opacity: 1; }
  }

  /* ── Hint shortcut ── */
  #hint {
    margin-top: 6px;
    font-size: 11px;
    font-weight: 600;
    color: #cbd5e1;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<div id="ptt-halo">
  <button id="ptt-btn" title="Tieni premuto per parlare">🎙️</button>
</div>
<div id="waveform">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div>
</div>
<p id="status">Tieni premuto per parlare</p>
<p id="hint">oppure usa [Spazio] sulla tastiera</p>

<script>
// ── Streamlit component communication ──────────────────────────────────────
function sendToStreamlit(type, data) {
  window.parent.postMessage(
    Object.assign({ isStreamlitMessage: true, type }, data),
    "*"
  );
}

function setFrameHeight() {
  sendToStreamlit("streamlit:setFrameHeight", { height: document.body.scrollHeight + 4 });
}

// Signal component is ready
sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });
setFrameHeight();

// ── DOM refs ───────────────────────────────────────────────────────────────
const btn       = document.getElementById("ptt-btn");
const statusEl  = document.getElementById("status");
const waveform  = document.getElementById("waveform");

// ── State ─────────────────────────────────────────────────────────────────
let audioCtx        = null;
let sourceNode      = null;
let processorNode   = null;
let mediaStream     = null;
let pcmSamples      = [];   // Float32 raw samples
let isRecording     = false;
let isProcessing    = false;
const SAMPLE_RATE   = 16000; // optimal for Whisper

// ── WAV encoder ───────────────────────────────────────────────────────────
function encodeWAV(float32Samples, sampleRate) {
  const numSamples = float32Samples.length;
  const buffer     = new ArrayBuffer(44 + numSamples * 2);
  const view       = new DataView(buffer);

  function writeStr(offset, str) {
    for (let i = 0; i < str.length; i++)
      view.setUint8(offset + i, str.charCodeAt(i));
  }

  // RIFF chunk
  writeStr(0,  "RIFF");
  view.setUint32(4,  36 + numSamples * 2, true);
  writeStr(8,  "WAVE");
  // fmt sub-chunk
  writeStr(12, "fmt ");
  view.setUint32(16, 16,          true);   // chunk size
  view.setUint16(20, 1,           true);   // PCM
  view.setUint16(22, 1,           true);   // mono
  view.setUint32(24, sampleRate,  true);
  view.setUint32(28, sampleRate * 2, true); // byte rate
  view.setUint16(32, 2,           true);   // block align
  view.setUint16(34, 16,          true);   // bits per sample
  // data sub-chunk
  writeStr(36, "data");
  view.setUint32(40, numSamples * 2, true);

  let offset = 44;
  for (let i = 0; i < numSamples; i++) {
    const s = Math.max(-1, Math.min(1, float32Samples[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    offset += 2;
  }
  return buffer;
}

function bufferToBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary  = "";
  for (let i = 0; i < bytes.byteLength; i++)
    binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

// ── Recording core ────────────────────────────────────────────────────────
async function startRecording() {
  if (isRecording || isProcessing) return;

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        sampleRate:        { ideal: SAMPLE_RATE },
        channelCount:      1,
        echoCancellation:  true,
        noiseSuppression:  true,
        autoGainControl:   true,
      }
    });

    audioCtx = new (window.AudioContext || window.webkitAudioContext)({
      sampleRate: SAMPLE_RATE
    });

    sourceNode    = audioCtx.createMediaStreamSource(mediaStream);
    processorNode = audioCtx.createScriptProcessor(4096, 1, 1);
    pcmSamples    = [];

    processorNode.onaudioprocess = (e) => {
      if (!isRecording) return;
      const channelData = e.inputBuffer.getChannelData(0);
      pcmSamples.push(new Float32Array(channelData));
    };

    sourceNode.connect(processorNode);
    processorNode.connect(audioCtx.destination);

    isRecording = true;
    setUI("recording");

  } catch (err) {
    console.error("Microphone error:", err);
    setUI("error", "❌ Microfono non disponibile");
    setTimeout(() => setUI("idle"), 2500);
  }
}

function stopRecording() {
  if (!isRecording) return;
  isRecording  = false;
  isProcessing = true;
  setUI("processing");

  // Stop media stream
  if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  if (processorNode) { processorNode.disconnect(); processorNode = null; }
  if (sourceNode)    { sourceNode.disconnect();    sourceNode    = null; }
  if (audioCtx)      { audioCtx.close();           audioCtx      = null; }

  // Merge all chunks
  const totalLen = pcmSamples.reduce((acc, c) => acc + c.length, 0);

  if (totalLen < SAMPLE_RATE * 0.3) {
    // Less than 300ms — too short, discard
    isProcessing = false;
    setUI("idle");
    return;
  }

  const merged = new Float32Array(totalLen);
  let offset = 0;
  for (const chunk of pcmSamples) {
    merged.set(chunk, offset);
    offset += chunk.length;
  }

  // Encode and send
  const wavBuffer = encodeWAV(merged, SAMPLE_RATE);
  const b64       = bufferToBase64(wavBuffer);

  sendToStreamlit("streamlit:setComponentValue", {
    value:    { audio: b64, mimeType: "audio/wav" },
    dataType: "json",
  });

  isProcessing = false;
  setUI("idle");
}

// ── UI helpers ────────────────────────────────────────────────────────────
function setUI(state, message) {
  btn.className       = "";
  statusEl.className  = "";
  waveform.className  = "";

  switch (state) {
    case "recording":
      btn.className      = "recording";
      statusEl.className = "recording-text";
      statusEl.textContent = "🔴 Sto registrando...";
      waveform.className = "visible";
      break;
    case "processing":
      btn.className      = "processing";
      statusEl.className = "processing-text";
      statusEl.textContent = "⏳ Elaborazione...";
      btn.innerHTML = "⏳";
      break;
    case "error":
      statusEl.className   = "error-text";
      statusEl.textContent = message || "❌ Errore";
      break;
    case "idle":
    default:
      btn.innerHTML        = "🎙️";
      statusEl.textContent = "Tieni premuto per parlare";
      break;
  }
}

// ── Event listeners ───────────────────────────────────────────────────────
btn.addEventListener("mousedown",  (e) => { e.preventDefault(); startRecording(); });
btn.addEventListener("mouseup",    stopRecording);
btn.addEventListener("mouseleave", stopRecording);

btn.addEventListener("touchstart", (e) => { e.preventDefault(); startRecording(); }, { passive: false });
btn.addEventListener("touchend",   (e) => { e.preventDefault(); stopRecording();   }, { passive: false });
btn.addEventListener("touchcancel", stopRecording);
btn.addEventListener("contextmenu", (e) => e.preventDefault());

// ── Spacebar shortcut ─────────────────────────────────────────────────────
// Il listener è registrato su window.top (la pagina Streamlit parent, same-origin)
// così funziona anche quando il focus non è dentro l'iframe del componente.
function onKeyDown(e) {
  if (e.code === "Space" && !e.repeat &&
      e.target.tagName !== "INPUT" && e.target.tagName !== "TEXTAREA") {
    e.preventDefault();
    startRecording();
  }
}
function onKeyUp(e) {
  if (e.code === "Space") {
    e.preventDefault();
    stopRecording();
  }
}

// Prova prima window.top (Streamlit è same-origin su localhost)
try {
  window.top.addEventListener("keydown", onKeyDown);
  window.top.addEventListener("keyup",   onKeyUp);
} catch (_) {
  // Fallback: listener sull'iframe stesso (funziona solo se l'iframe ha focus)
  document.addEventListener("keydown", onKeyDown);
  document.addEventListener("keyup",   onKeyUp);
}
</script>
</body>
</html>
